# Runs the test suite on every push and pull request.
#
# The July 2026 architecture review's cheapest recommendation: the send-policy
# and contact-lookup tests existed, but no workflow ran them, so the one tested
# area of the codebase could regress silently.
#
# The tests are standalone scripts, not a pytest suite — each is executable on
# its own and stubs out some heavy runtime imports (langdetect, signal-cli, …)
# so it can load a gateway module in isolation. Keep them that way.
#
# They are NOT dependency-free, though: the gateway modules they import pull in
# markdown-it-py (web-gateway) and requests (the messaging gateways) at module
# scope, so those must be installed for the imports to succeed. langdetect is
# genuinely stubbed and is not needed. This list was determined by running the
# suite in a clean venv — if you add a module-scope third-party import to a
# script under test, add it here too.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install markdown-it-py requests pywebpush

      - name: Run test suite
        run: |
          failed=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            if python3 "$t"; then
              echo "PASS $t"
            else
              echo "::error file=$t::$t failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

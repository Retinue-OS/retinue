# Runs the test suite on every push and pull request.
#
# The July 2026 architecture review's cheapest recommendation: the send-policy
# and contact-lookup tests existed, but no workflow ran them, so the one tested
# area of the codebase could regress silently.
#
# The tests are standalone scripts, not a pytest suite — each is executable on
# its own and stubs out the heavy runtime imports (langdetect, signal-cli, …) so
# it can load a gateway module in isolation. Keep them that way: it is why they
# run here in a couple of seconds with no dependency install.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suite
        run: |
          failed=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            if python3 "$t"; then
              echo "PASS $t"
            else
              echo "::error file=$t::$t failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
